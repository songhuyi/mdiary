# Diary app reverse proxy
# Add this inside your existing nginx server { } block.
#
# If nginx runs INSIDE the same Docker network as the diary container,
# use: proxy_pass http://diary:3000;
#
# If nginx runs on the HOST machine (not containerized),
# use: proxy_pass http://127.0.0.1:3000;

location / {
    proxy_pass http://diary:3000;
    proxy_http_version 1.1;

    # Required for NextAuth sessions and WebSocket support
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Standard proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Prevent caching issues with authenticated pages
    proxy_cache_bypass $http_upgrade;
    proxy_no_cache $http_upgrade;

    # Increased timeout for AI polish feature (can take 10-60 seconds)
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
}
